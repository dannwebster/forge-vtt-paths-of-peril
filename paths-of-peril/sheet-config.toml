# Paths of Peril — pbta Sheet Config
# Paste the entire contents of this file into:
#   Game Settings → System Settings (Powered by the Apocalypse) → Sheet Configuration
# Requires: pbta system v1.1.0+

rollFormula  = "2d6"
rollShifting = true

# Roll result tier keys MUST match the moveResults keys used in every move item
# (failure / partial / success / critical).
[rollResults]

  [rollResults.failure]
  range = "6-"
  label = "6-"

  [rollResults.partial]
  range = "7-9"
  label = "7-9"

  [rollResults.success]
  range = "10-12"
  label = "10-12"

  [rollResults.critical]
  range = "13+"
  label = "13+"

# ─────────────────────────────────────────────────────────────────────────────
# Hero (PC)
# ─────────────────────────────────────────────────────────────────────────────

[character]
label = "Hero"

  # Stat keys MUST match the rollType field in every move item.
  [character.stats]
  nerve  = "Nerve"
  brains = "Brains"
  charm  = "Charm"
  tough  = "Tough"

  # Move-group keys MUST match the moveType field in every move item.
  [character.moveTypes]
  basic    = { label = "Basic Moves",    playbook = false }
  occult   = { label = "Occult Moves",   playbook = false }
  chase    = { label = "Chase Moves",    playbook = false }
  playbook = { label = "Playbook Moves", playbook = true  }

  [character.equipmentTypes]
  gear = "Gear"

  # ── Top bar ───────────────────────────────────────────────────────────────

  [character.attributesTop]

    [character.attributesTop.experience]
    label = "Experience"
    type  = "Xp"
    max   = 5

    [character.attributesTop.look]
    label = "Look"
    type  = "LongText"

    [character.attributesTop.virtue]
    label = "Virtue"
    type  = "Text"

    [character.attributesTop.vice]
    label = "Vice"
    type  = "Text"

  # ── Left column ───────────────────────────────────────────────────────────

  [character.attributesLeft]

    # Conditions — non-cumulative; only the highest marked penalty applies.
    # In Jeopardy! is always taken first; clears at end of a Peril or by burning an Edge.
    [character.attributesLeft.conditions]
    label     = "Conditions"
    type      = "ListMany"
    condition = false
    options   = [
      { label = "In Jeopardy! (–0)" },
      { label = "–0 Condition"      },
      { label = "–1 Condition"      },
      { label = "–2 Condition"      }
    ]

    [character.attributesLeft.condition_desc_0]
    label = "–0 Condition description"
    type  = "Text"

    [character.attributesLeft.condition_desc_1]
    label = "–1 Condition description"
    type  = "Text"

    [character.attributesLeft.condition_desc_2]
    label = "–2 Condition description"
    type  = "Text"

    # Up to 5 contacts; each has Name · Rating (–1 to +3) · Expertise · Locale · Relationship.
    [character.attributesLeft.contacts]
    label = "Contacts  (Name | Rating | Expertise | Locale | Relationship)"
    type  = "LongText"

    # ── Daredevil only — leave blank for other playbooks ─────────────────────

    [character.attributesLeft.vehicle_class]
    label   = "Vehicle Class Specialization (Daredevil)"
    type    = "ListOne"
    options = [
      { label = "Cars"        },
      { label = "Trucks"      },
      { label = "Motorcycles" },
      { label = "Aircraft"    },
      { label = "Watercraft"  }
    ]

    [character.attributesLeft.vehicle_description]
    label = "Current Vehicle Description (Daredevil)"
    type  = "Text"

    # ── Scholar only — leave blank for other playbooks ───────────────────────

    [character.attributesLeft.org_description]
    label = "Organization Description (Scholar)"
    type  = "LongText"

    [character.attributesLeft.org_resources]
    label     = "Organization Resources (Scholar — pick 2)"
    type      = "ListMany"
    condition = false
    options   = [
      { label = "Well-armed"            },
      { label = "Well-financed"         },
      { label = "Rigorous training"     },
      { label = "Official pull"         },
      { label = "Cover identities"      },
      { label = "Offices all over"      },
      { label = "Good intel"            },
      { label = "Recognised authority"  },
      { label = "Support teams"         }
    ]

    [character.attributesLeft.org_red_tape]
    label     = "Organization Red Tape (Scholar — pick 2)"
    type      = "ListMany"
    condition = false
    options   = [
      { label = "Dubious motives"            },
      { label = "Bureaucratic"               },
      { label = "Secretive hierarchy"        },
      { label = "Cryptic missions"           },
      { label = "Hostile superiors"          },
      { label = "Inter-departmental rivalry" },
      { label = "Budget cuts"                },
      { label = "Take no prisoners policy"   },
      { label = "Acquisitive"                }
    ]

    # ── Soldier only — leave blank for other playbooks ───────────────────────

    [character.attributesLeft.sig_weapon_name]
    label = "Signature Weapon Name (Soldier)"
    type  = "Text"

    [character.attributesLeft.sig_weapon_type]
    label = "Signature Weapon Type (Soldier)"
    type  = "Text"

    [character.attributesLeft.sig_weapon_description]
    label = "Signature Weapon Description (Soldier)"
    type  = "LongText"

    # Pick 4 tags; optionally take 1 drawback tag to gain a 5th regular tag.
    [character.attributesLeft.sig_weapon_tags]
    label     = "Signature Weapon Tags (Soldier — pick 4; +1 drawback for extra tag)"
    type      = "ListMany"
    condition = false
    options   = [
      { label = "Shoot!"                },
      { label = "Fight!"                },
      { label = "Lethal"                },
      { label = "Non-Lethal"            },
      { label = "+1 Harm"               },
      { label = "Concealable"           },
      { label = "+1 More Harm"          },
      { label = "Long-Range"            },
      { label = "Silent"                },
      { label = "Utility"               },
      { label = "Loud (drawback)"       },
      { label = "Messy (drawback)"      },
      { label = "Unreliable (drawback)" },
      { label = "Reload (drawback)"     },
      { label = "Unstable (drawback)"   }
    ]

  # ── Right column ──────────────────────────────────────────────────────────

  [character.attributesRight]

    # Shadows of the Past — mark each as its flashback is narrated to change fate.
    [character.attributesRight.shadows_past]
    label     = "Shadows of the Past"
    type      = "ListMany"
    condition = false
    options   = [
      { label = "A mentor's lesson, and what it taught you"                    },
      { label = "Your fondest memory, and how it brings you strength"           },
      { label = "A romantic attachment gone awry, and what you learned from it" },
      { label = "The first time you saw someone die, and how it shaped you"     },
      { label = "Your darkest hour, and how you overcame it"                    }
    ]

    # Shadows of the Uncanny — always mark in order from first to last.
    [character.attributesRight.shadows_uncanny]
    label     = "Shadows of the Uncanny"
    type      = "ListMany"
    condition = false
    options   = [
      { label = "Touched by Strangeness — When you Enlighten!, include one strange fact that is not part of real-world history. This is now true." },
      { label = "Called down Hidden Paths — When you indulge a Virtue or Vice to clear a Condition, the Hidden World notices. You or the Director introduces a strange sign, supernatural clue, watchful interloper, etc." },
      { label = "Scarred by Trackless Wastes — Reduce your Charm by 1 and increase your Brains by 1. Any serious conversation you have eventually bends toward the Unnatural. You may now attempt The Occult Move." },
      { label = "Bound to Forbidden Worlds — Take the -0 Condition \"Obsessed with the Uncanny\" (This overrides any existing -0 Condition). This Condition cannot be cleared." },
      { label = "Lost to Darkest Legend — Retire your character from play. Their obsession has overtaken their ordinary life, and they vanish into the Weird as a rumor, warning, relic-hunter, cultist, guardian, or legend." }
    ]

# ─────────────────────────────────────────────────────────────────────────────
# Enemy (NPC)
# ─────────────────────────────────────────────────────────────────────────────

[npc]
label = "Enemy"

  [npc.moveTypes]
  enemy = "Enemy Moves"

  [npc.equipmentTypes]
  gear = "Gear"

  [npc.attributesLeft]

    # Harm thresholds by type:
    #   Mook 1 | Henchman 2 | Heavy 3 | Boss 4 | Villain 4 (→ Retreating, not Taken Out)
    [npc.attributesLeft.enemy_type]
    label   = "Enemy Type"
    type    = "ListOne"
    options = [
      { label = "Mook (1 Harm → Taken Out)"     },
      { label = "Henchman (2 Harm → Taken Out)" },
      { label = "Heavy (3 Harm → Taken Out)"    },
      { label = "Boss (4 Harm → Taken Out)"     },
      { label = "Villain (4 Harm → Retreating)" }
    ]

    # Scratched cannot be removed once applied.
    # Disabled can be removed: enemy spends an action to re-enter the fight.
    [npc.attributesLeft.status]
    label   = "Status"
    type    = "ListOne"
    options = [
      { label = "Unhurt"     },
      { label = "Scratched"  },
      { label = "Disabled"   },
      { label = "Taken Out"  },
      { label = "Retreating" }
    ]

    [npc.attributesLeft.description]
    label = "Description / Notes"
    type  = "LongText"
